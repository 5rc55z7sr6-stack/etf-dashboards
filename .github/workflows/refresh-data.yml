name: Refresh ETF Signal Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: refresh-data
  cancel-in-progress: false   # never kill a running refresh mid-fetch

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0          # full history so rebase has context

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests --quiet

      - name: Fetch & compute signal data
        run: python scripts/refresh_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if something changed
          if git diff --staged --quiet; then
            echo "data.json unchanged — nothing to push"
            exit 0
          fi
          git commit -m "data: refresh ETF signals [skip ci]"
          # Pull latest (other commits may have landed) then push
          git pull --rebase origin main
          git push
